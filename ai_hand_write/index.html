<!DOCTYPE html>

<html>
<head>
  <title>Handwriting Pridction Demo</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #0f172a;
    color: white;
  }

  #label-container {
    margin-top: 20px;
    width: 300px;
    margin-left: auto;
    margin-right: auto;
  }

  .label-row {
    margin: 8px 0;
    text-align: left;
  }

  .label-name {
    font-size: 14px;
    margin-bottom: 3px;
  }

  .bar-bg {
    width: 100%;
    height: 10px;
    background: #334155;
    border-radius: 5px;
    overflow: hidden;
  }

  .bar-fill {
    height: 10px;
    background: #38bdf8;
    width: 0%;
    transition: width 0.2s ease;
  }
  .best {
    background: rgba(34, 197, 94, 0.15);
    border-left: 4px solid #22c55e;
    padding-left: 6px;
    border-radius: 6px;
  }

  .best .bar-fill {
    background: #22c55e !important;
  }

  .best .label-name {
    color: #22c55e;
    font-weight: bold;
  }
  #webcam-container canvas,
  #image-container img {
    border-radius: 10px;
    margin-top: 10px;
  }
</style>
</head>

<body>
  <h1>Handwriting Prediction Model</h1>
  <button onclick="init()">Load Model</button>
  <button onclick="setMode('webcam')">Webcam</button>
  <button onclick="setMode('upload')">Upload Image</button>

  <p id="status">Model not loaded</p>

  <div id="webcam-container"></div>

  <input type="file" id="fileInput" accept="image/*" style="display:none;">

  <div id="image-container"></div>
  <div id="label-container"></div>
  
  <!-- TensorFlow + Teachable Machine library -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
  
  <script>
    const MODEL_URL = "./"; // folder where model files are stored
let model, webcam, labelContainer, maxPredictions;
let currentMode = null;

async function init() {
  const modelURL = MODEL_URL + "model.json";
  const metadataURL = MODEL_URL + "metadata.json";

  model = await tmImage.load(modelURL, metadataURL);
  maxPredictions = model.getTotalClasses();

  document.getElementById("status").innerText = "Model loaded!";
}

function setMode(mode) {
  currentMode = mode;

  // clear UI
  document.getElementById("webcam-container").innerHTML = "";
  document.getElementById("image-container").innerHTML = "";
  document.getElementById("label-container").innerHTML = "";

  if (mode === "webcam") {
    startWebcam();
  }

  if (mode === "upload") {
    startUpload();
  }
}

async function startWebcam() {
  webcam = new tmImage.Webcam(300, 300, true);
  await webcam.setup();
  await webcam.play();

  document.getElementById("webcam-container").appendChild(webcam.canvas);

  window.requestAnimationFrame(webcamLoop);

  setupLabels();
}

async function webcamLoop() {
  if (currentMode !== "webcam") return;

  webcam.update();
  await predict(webcam.canvas);

  window.requestAnimationFrame(webcamLoop);
}

function startUpload() {
  const input = document.getElementById("fileInput");
  input.style.display = "block";

  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = async () => {
      document.getElementById("image-container").innerHTML = "";
      document.getElementById("image-container").appendChild(img);

      await predict(img);
    };
  };

  setupLabels();
}

function setupLabels() {
  labelContainer = document.getElementById("label-container");
  labelContainer.innerHTML = "";

  for (let i = 0; i < maxPredictions; i++) {
    const row = document.createElement("div");
    row.className = "label-row";

    const name = document.createElement("div");
    name.className = "label-name";
    name.innerHTML = "Class " + (i + 1);

    const barBg = document.createElement("div");
    barBg.className = "bar-bg";

    const barFill = document.createElement("div");
    barFill.className = "bar-fill";

    barBg.appendChild(barFill);

    row.appendChild(name);
    row.appendChild(barBg);

    labelContainer.appendChild(row);
  }
}

async function predict(input) {
  if (!model) return;

  const prediction = await model.predict(input);

  let highestIndex = 0;
  let highestProb = 0;

  // find strongest prediction
  for (let i = 0; i < prediction.length; i++) {
    if (prediction[i].probability > highestProb) {
      highestProb = prediction[i].probability;
      highestIndex = i;
    }
  }

  for (let i = 0; i < prediction.length; i++) {
    const prob = prediction[i].probability;

    const row = labelContainer.childNodes[i];
    const name = row.querySelector(".label-name");
    const bar = row.querySelector(".bar-fill");

    name.innerHTML =
      prediction[i].className + " — " +
      (prob * 100).toFixed(1) + "%";

    bar.style.width = (prob * 100) + "%";

    // remove previous highlight
    row.classList.remove("best");

    // highlight strongest prediction
    if (i === highestIndex) {
      row.classList.add("best");
    }
  }
}
  
  </script>
</body>
</html>
